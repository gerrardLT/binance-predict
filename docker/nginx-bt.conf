# ============================================================
# 宝塔面板 Nginx 站点配置模板
# ============================================================
# 使用方式：
#   1. 宝塔面板 → 网站 → 添加站点（填好域名和根目录）
#   2. 站点设置 → 配置文件
#   3. 将下方 server {} 块内容替换或合并到现有配置
# ============================================================

server {
    listen 80;
    server_name predict.yourdomain.com;  # ← 替换为你的域名

    # 前端静态文件（React SPA 构建产物）
    # 将 frontend/dist/ 内容上传到此目录
    root /www/wwwroot/predict;
    index index.html;

    # 前端路由：所有非 API 请求走 SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端 Docker 容器
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 禁用缓冲（支持流式响应）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # 访问日志（可选）
    access_log /www/wwwlogs/predict.log;
    error_log /www/wwwlogs/predict.error.log;
}
