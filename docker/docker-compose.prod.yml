# ============================================================
# 生产环境 docker-compose（VPS 部署用）
# ============================================================
# 镜像从 GHCR 拉取，由 GitHub Actions CI/CD 自动构建推送。
# 使用方式：
#   1. 将此文件放置到 VPS 的 /www/wwwroot/binance-predict/
#   2. 创建 .env 文件（含所有生产环境变量）
#   3. docker compose -f docker-compose.prod.yml pull
#   4. docker compose -f docker-compose.prod.yml up -d
# ============================================================

# Docker 容器日志（stderr）统一限额，防止 json-file 无限增长撑爆磁盘
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  db:
    image: timescale/timescaledb:latest-pg16
    logging: *default-logging
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-binance_predict}
    # 不暴露 DB 端口到宿主机，仅 Docker 内部网络可访问（避免与宝塔 PostgreSQL 冲突）
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  backend:
    image: ghcr.io/gerrardlt/binance-predict-backend:latest
    logging: *default-logging
    ports:
      - "127.0.0.1:8002:8000"  # 仅本地可访问（由 Nginx 反向代理）
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-binance_predict}
    volumes:
      - bp-logs:/app/logs  # loguru 文件日志持久化（部署重建不丢失）
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    image: ghcr.io/gerrardlt/binance-predict-frontend:latest
    logging: *default-logging
    ports:
      - "8082:80"  # 对外开放，可通过 IP:8082 直接访问前端
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

volumes:
  pgdata:
  bp-logs:

networks:
  app-network:
    driver: bridge
